<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080a0c">
  <title>Nacho</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='29' fill='%2315181a' stroke='%23ffb238' stroke-width='3'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-size='34' fill='%23f3eee4'%3EN%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/nacho.css?v=20260712-6">
</head>
<body>
  <main class="stage" data-state="idle">
    <div class="grain" aria-hidden="true"></div>
    <header class="brand" aria-label="Nacho, assistente do Sentinela">
      <span class="brand-mark"></span>
      <span>NACHO</span>
    </header>

    <section class="interaction" aria-live="polite">
      <div class="sound-field" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>

      <button class="bottle-cap" id="talkButton" type="button"
              aria-label="Começar interação com Nacho" aria-pressed="false">
        <span class="cap-teeth" aria-hidden="true"></span>
        <span class="cap-face">
          <span class="cap-shine" aria-hidden="true"></span>
          <span class="cap-word">N</span>
          <span class="cap-action">TOQUE</span>
        </span>
      </button>

      <div class="status">
        <p class="status-title" id="statusTitle">Pode chamar</p>
        <p class="status-detail" id="statusDetail">Toque na tampa para começar</p>
      </div>
    </section>

    <footer>
      <span class="privacy-dot"></span>
      O microfone só é ativado após o seu toque
    </footer>
  </main>
  <script src="/static/nacho.js?v=20260712-6"></script>
</body>
</html>
